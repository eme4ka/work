<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StandUp Харків</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav>

<div><b>StandUp • Харків</b></div>

<div>
<a onclick="openTiming()">Таймінг</a>
<a onclick="openRules()">Правила</a>
<a onclick="openTickets()">Квитки</a>
<a onclick="openBuy()">Купити квиток</a>
</div>

</nav>


<div class="main">

<h1>Стендап вечір у Харкові</h1>

<div class="meta">
7 березня 2026 • 20:00<br>
Холодногірська вулиця, 11
</div>

<button class="buy" onclick="openBuy()">Купити квиток</button>

</div>


<!-- INFO MODAL -->

<div class="modal" id="infoModal">

<div class="modalBox">

<h2 id="modalTitle"></h2>

<div id="modalContent"></div>

<button class="close" onclick="closeInfo()">Закрити</button>

</div>

</div>


<!-- BUY MODAL -->

<div class="modal" id="buyModal">

<div class="modalBox">

<h2>Обери квиток</h2>

<div id="ticketSelect">

<div class="ticket" onclick="selectTicket('Стандарт',1500)">
Стандарт — 1500 грн
</div>

<div class="ticket" onclick="selectTicket('Хороші місця',2000)">
Хороші місця — 2000 грн
</div>

<div class="ticket" onclick="selectTicket('VIP',3000)">
VIP — 3000 грн
</div>

</div>


<div id="payment" style="display:none">

<div class="price" id="ticketInfo"></div>

<p>Оплати на картку:</p>

<b>5355 2800 5690 4285</b>

<div class="formBox">

<label class="label">Ім'я</label>
<input class="input" id="name">

<label class="label">Номер телефону</label>

<div class="phoneBox">
<div class="prefix">+380</div>
<input class="phoneInput" id="phone">
</div>

<label class="label">Квитанція</label>
<input class="input" type="file" id="receipt">

<button class="sendBtn" onclick="sendReceipt()">Відправити</button>

</div>

</div>

<button class="close" onclick="closeBuy()">Закрити</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
